# Loveca Nginx 配置
# 将此文件复制到 /etc/nginx/sites-available/loveca.conf
# 然后创建软链接: ln -s /etc/nginx/sites-available/loveca.conf /etc/nginx/sites-enabled/
# 最后重载 nginx: sudo nginx -s reload

# HTTP - 重定向到 HTTPS
server {
    listen 80;
    server_name loveca.lovelivefun.xyz;
    
    # 301 永久重定向到 HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name loveca.lovelivefun.xyz;

    # SSL 证书配置
    ssl_certificate /etc/nginx/ssl/lovelivefun.xyz/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/lovelivefun.xyz/privkey.pem;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # HSTS (可选，启用后浏览器会强制使用 HTTPS)
    add_header Strict-Transport-Security "max-age=63072000" always;

    # 访问日志
    access_log /var/log/nginx/loveca.access.log;
    error_log /var/log/nginx/loveca.error.log;

    location / {
        proxy_pass http://localhost:4173;
        proxy_http_version 1.1;
        
        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # 标准代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_cache_bypass $http_upgrade;
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Service Worker 不缓存，确保浏览器每次检查更新
    location = /sw.js {
        proxy_pass http://localhost:4173;
        add_header Cache-Control "no-cache";
    }

    # 静态资源缓存（带哈希的文件名可以长期缓存）
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
        proxy_pass http://localhost:4173;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # API Server proxy
    location /api/ {
        proxy_pass http://127.0.0.1:3007;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # For image uploads
        client_max_body_size 30m;

        proxy_connect_timeout 15s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Image proxy to remote MinIO server
    # Replace MINIO_SERVER_IP with actual MinIO server address
    location ^~ /images/ {
        proxy_pass http://39.105.116.19:9000/loveca-cards/;
        proxy_set_header Host $host;

        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # DashScope AI API 代理 (must be before /api/ due to longer prefix)
    location /api/dashscope/ {
        proxy_pass https://dashscope.aliyuncs.com/compatible-mode/v1/;
        proxy_set_header Authorization "Bearer sk-your-api-key";
        proxy_set_header Content-Type "application/json";
        proxy_set_header Host dashscope.aliyuncs.com;
        proxy_ssl_server_name on;

        # AI 请求可能较慢
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;
    }
}
